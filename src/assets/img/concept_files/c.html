<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>chatplus</title></head>
<body><script>
(function() {
	var parser = document.createElement('a');
	parser.href = 'https://catmocha.jp/?yclid=YSS.1000004600.EAIaIQobChMIxbzAt62jkwMVyiZ7Bx2GLxDhEAAYASAAEgKXW_D_BwE&amp;sa_p=YSA&amp;sa_cc=1000004600&amp;sa_t=1773627533255&amp;sa_ra=82';
	var p_domain = parser.port ? parser.protocol + '//' + parser.hostname + ':' + parser.port : parser.protocol + '//' + parser.hostname;

	var postMessage = function(obj) {
		if (/MSIE/.test(window.navigator.userAgent)) {window.parent.postMessage(JSON.stringify(obj), p_domain);}
		else {window.parent.postMessage(obj, p_domain);}
	};

	var obj = {
		't': 'va',
		'data': {
			'access_key': '9cba2354',
			'site_id': '1',
			'va': '558017',
		},
		'ctoken': 'krrvqf77gqxp3235v8z69cba2354',
		'via': '558017',
	};
	postMessage(obj);

	window.addEventListener('message', function(event) {
		var message = {};
		try {message = typeof(event.data) === 'object' ? event.data : JSON.parse(event.data);} catch (e) {}
		if (message == null || typeof message !== 'object' || ! ('type' in message)) {return;}

		var ajax = function(req, f, r) {
			if ('chatplus' in window && 'ajax' in window.chatplus) {
				window.chatplus.ajax(req).then(f, r);
			} else {
				var s = document.createElement('script');
				s.src = 'https://appimg.chatplus.jp/app/s/lib/ajax.min.js';
				s.addEventListener('load', function() {window.chatplus.ajax(req).then(f, r);}, {'once': true});
				document.body.appendChild(s);
			}
		};

		switch (message.type) {
			case 'edit-lead':
				message.params['accessToken'] = message.token;
				message.params['siteId'] = message.siteId;
				message.params['token'] = message.vtoken;
				ajax(
					{
						'method': 'POST',
						'url': '/api/v1/update_user',
						'data': message.params,
					},
					function(data) {postMessage({'t': 'update-user-callback', 'response': data});},
					function(res) {postMessage({'t': 'update-user-callback', 'response': {'result': -1, 'code': res.status}});}
				);
				break;
			case 'get-lead-one':
				ajax(
					{
						'method': 'POST',
						'url': '/api/v1/get_lead_one',
						'data': {'accessToken': message.token, 'siteId': message.siteId, 'token': message.vtoken, 'option': message.option},
					},
					function(data) {postMessage({'t': 'get-lead-one-callback', 'response': data});},
					function(res) {postMessage({'t': 'get-lead-one-callback', 'response': {'result': -1, 'code': res.status}});}
				);
				break;
			case 'get-visitor-option': {
				var cookie_key_option = 'chatplus_visitor_option' + '_' + message.access_key;
				var option = message.default || {};

				if ((new RegExp('(?:^|;\\s*)' + escape(cookie_key_option).replace(/[-.+*]/g, '\\$&') + '\\s*\\=')).test(window.document.cookie)) {
					var option_s = unescape(window.document.cookie.replace(new RegExp('(?:^|.*;\\s*)' + escape(cookie_key_option).replace(/[-.+*]/g, '\\$&') + '\\s*\\=\\s*((?:[^;](?!;))*[^;]?).*'), '$1'));
					option = JSON.parse(option_s);
				}

				postMessage({
					't': 'get-visitor-option-callback',
					'response': option,
				});
				break;
			}
		}
	});
})();
</script>
